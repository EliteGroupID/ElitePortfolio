name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 128.199.202.18
          username: "root"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /path/to/your/react/app
            git pull origin main
            npm install
            npm run build

      - name: Copy build files to server
        uses: appleboy/scp-action@master
        with:
          host: 128.199.202.18
          username: "root"
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/*" # Source files or directories
          target: "/var/www/production/elite-portfolio" # Destination directory on server
